version: '3.8'

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local

services:
  db:
    image: postgres
    container_name: app_postgres
    restart: always
    environment:
      POSTGRES_USER: pulse_user
      POSTGRES_PASSWORD: pulse_pass
      POSTGRES_DB: pulsestream
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network


  cache:
    image: redis
    container_name: app_redis
    restart: always
    ports: 
      - "6379:6379"
    networks:
      - app-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: app_zookeeper
    environment: 
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - app-network


  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: app_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1 
    networks:
     - app-network

  api:
    build: .
    container_name: fastapi_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres@db:5432/postgres
      - REDIS_URL=redis://cache:6379/0
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      - db
      - cache
      - kafka
    networks:
      - app-network
    
  prometheus:
    image: prom/prometheus:latest
    container_name: app_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - app-network
    depends_on:
      - api

  grafana:
    image: grafana/grafana:latest
    container_name: app_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - app-network
    depends_on:
      - prometheus

